name: Hugo Build Check

on:
  pull_request:
    paths:
      - "atlantacoven.org/**"
      - ".github/workflows/hugo-build-check.yml"

defaults:
  run:
    working-directory: atlantacoven.org

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: atlantacoven.org/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.1"
          extended: true

      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify --baseURL "https://atlantacoven.org/"
