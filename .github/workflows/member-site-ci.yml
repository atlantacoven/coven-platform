name: Member Site CI

on:
  pull_request:
    paths:
      - "member-site/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/member-site-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./member-site/...

      - name: Test
        run: go test ./member-site/...
