; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = teensy3

[env:teensy3]
platform = platformio/teensy
framework = arduino
board = teensy31
; See https://github.com/platformio/platform-teensy/issues/65
; build_unflags = -D USB_SERIAL
build_flags =
    ; -D USB_DUAL_SERIAL
    -D USB_SERIAL
    -D NFC_INTERFACE_SPI
    -D HAVE_ED25519_KEY_EXPORT -D HAVE_ED25519 -D WOLFSSL_SHA512 -D HAVE_HPKE
    -D HAVE_HKDF -D WOLFSSL_KEY_GEN
    -D WOLFSSL_CLIENT_EXAMPLE -D NO_WOLFSSL_CLIENT
    -D WC_NO_HARDEN
    ; -D DEBUG
lib_deps =
    https://github.com/Seeed-Studio/PN532.git
    wolfssl/Arduino-wolfSSL
    ; https://github.com/ftrias/TeensyDebug.git
; upload_protocol = teensy-cli
