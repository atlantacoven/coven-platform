; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = teensy3

[env:teensy3]
platform = platformio/teensy
framework = arduino
board = teensy31
build_flags =
    -D USB_SERIAL
    -D NFC_INTERFACE_SPI
    -D HAVE_ED25519_KEY_EXPORT -D HAVE_ED25519 -D WOLFSSL_SHA512
    -D WOLFSSL_CLIENT_EXAMPLE -D NO_WOLFSSL_CLIENT -D WOLFSSL_KEY_GEN
    -D WC_NO_HARDEN -D DEBUG_WOLFSSL_VERBOSE
; -D DEBUG
lib_deps =
    https://github.com/Seeed-Studio/PN532.git
    wolfssl/Arduino-wolfSSL
