# Workshops & Events page content. Rendered by layouts/workshops/list.html
#
# types          - list of {icon, title, color, items: [string]}
# accessibility  - {intro (HTML), audiences: [{label, desc}]}
# empty_state    - shown when no upcoming pages exist:
#                  {icon, title, body, cta_label, cta_url}

types:
  - icon: 🎓
    title: Skill Shares
    color: accent
    items:
      - Music production & Eurorack patching
      - Cosplay construction & 3D printing
      - Video editing & analog effects
      - Electronics prototyping & soldering
  - icon: 🛠️
    title: Project Work Sessions
    color: warm
    items:
      - Dedicated time for members to work on projects
      - Peer support and collaborative feedback
      - Access to all shared equipment
  - icon: 🗳️
    title: Community Meetings
    color: cyan
    items:
      - Space governance and planning
      - Discussion of improvements and needs
      - Held monthly for all members
  - icon: 🌸
    title: Social Gatherings
    color: yellow
    items:
      - Build community bonds
      - Celebrate accomplishments
      - Casual get-togethers

accessibility:
  intro: 'All events adhere to our <a href="/code-of-conduct/" style="color: var(--coven-cyan);">Code of Conduct</a> and are designed as safe, affirming spaces for queer individuals.'
  audiences:
    - label: Founders-only
      desc: Governance and planning sessions
    - label: Member-only
      desc: Tool training and project work
    - label: Members + chaperoned guests
      desc: Skill-shares and community events
    - label: Publicly advertised
      desc: Special community events (rare)

empty_state:
  icon: 📅
  title: No upcoming events
  body: Check back soon — or reach out to propose a workshop or skill-share!
  cta_label: Propose an Event →
  cta_url: /contact/
