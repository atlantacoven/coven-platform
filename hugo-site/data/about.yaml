# About page content. Rendered by layouts/about/single.html
#
# Sections:
#   hero        - {tagline}
#   mission     - mission statement (string)
#   story       - origin story (string)
#   focus_areas - list of {icon, title, desc, color}
#   values      - list of {v, d} (label + description)
#   space       - list of strings (HTML allowed for inline links)
#   governance  - list of strings
#   cta         - {text, label, url}

hero:
  tagline: >-
    A collaborative space for trans creators — focused on mutual support,
    skill-sharing, and creative work in music, cosplay, video, and electronics.

mission: >-
  The Coven exists as a collaborative space for trans creators, focused on
  mutual support, skill-sharing, and creative projects. Our space prioritizes
  trans safety, empowerment, and creative freedom. At launch, membership is
  explicitly limited to trans individuals to provide a safe, affirming
  environment in a world where cis resources already dominate.

story: >-
  Founded in early 2025 by trans founders, The Coven was created to address
  the need for trans-focused creative spaces — where transgender individuals
  can build, learn, and create together in safety and solidarity.

focus_areas:
  - icon: 🎛️
    title: Music & Eurorack
    desc: Electronic music creation, synthesis, and performance
    color: accent
  - icon: 🧵
    title: Cosplay & 3D Printing
    desc: Costume creation, 3D printing, and fabrication
    color: warm
  - icon: 📼
    title: Analog Video
    desc: Vintage video equipment, processing, and experimental techniques
    color: cyan
  - icon: ⚡
    title: Software & Electronics
    desc: Coding, circuit design, hardware hacking, and embedded systems
    color: yellow

values:
  - v: Trans Safety
    d: Creating affirming spaces where trans individuals can create without fear
  - v: Mutual Support
    d: Skill-sharing and knowledge exchange as community pillars
  - v: Creative Freedom
    d: Encouraging experimental and exploratory projects
  - v: Consent & Respect
    d: Upholding bodily autonomy and personal boundaries
  - v: Collective Care
    d: Looking out for one another's wellbeing and safety

space:
  - '<a href="https://www.openstreetmap.org/relation/11742136#map=19/33.756108/-84.366843" target="_blank" rel="noopener" style="color: var(--coven-accent);">Studioplex</a>'
  - Founders have 24/7 access
  - Members have business hours access
  - Shared lounge/kitchen in building commons
  - Cubby-sized storage for members

governance:
  - Each founder holds one vote
  - Majority vote (≥3 of 4) for major decisions
  - Each founder retains membership veto
  - Trans-only policy reviewable only by unanimous vote

cta:
  text: Interested in joining our creative community?
  label: Learn How to Join →
  url: /join/
