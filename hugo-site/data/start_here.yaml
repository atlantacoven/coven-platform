# Start Here page content. Rendered by layouts/start-here/list.html
#
# Sections:
#   intro           - highlighted callout text (HTML allowed for emphasis)
#   offerings       - list of {icon, title, desc, color}
#   paths           - "How to Get Involved" — list of {num, title, color, type, ...}
#                     type: "links"  -> items: [{label, url}]
#                     type: "steps"  -> items: [string, ...]
#                     type: "list"   -> items: [string, ...]   (or HTML strings)
#                     wide: true     -> full width; otherwise paired in a 2-col grid
#   table           - membership table rows: list of {type, cost, access, storage, color}
#   first_day       - list of strings for the checklist
#   cta             - {text, primary: {label, url}, secondary: {label, url}}

intro: '<span class="font-semibold text-white">The Coven is founded by trans people for the queer community</span> — providing a safe, affirming creative environment in a world where cis resources already dominate. Guests are welcome when chaperoned by a founder or approved member.'

offerings:
  - icon: 🎛️
    title: Music & Eurorack
    desc: Electronic music creation, synthesis, and performance
    color: accent
  - icon: 🧵
    title: Cosplay & 3D Printing
    desc: Costume creation, 3D printing, and fabrication
    color: warm
  - icon: 📼
    title: Analog Video
    desc: Vintage video equipment, processing, and experimental techniques
    color: cyan
  - icon: ⚡
    title: Software & Electronics
    desc: Coding, circuit design, hardware hacking, and embedded systems
    color: yellow

paths:
  - num: 1
    title: Learn About Us
    color: accent
    type: links
    wide: true
    items:
      - label: Covenant
        url: /charter/
      - label: Code of Conduct
        url: /code-of-conduct/
      - label: FAQ
        url: /faq/

  - num: 2
    title: Apply for Membership
    color: warm
    type: steps
    wide: true
    items:
      - 'Email <span class="text-white">hello@atlantacoven.org</span> with a brief intro, your creative interests, and what you''d contribute'
      - Founders review applications at monthly meetings
      - Approval requires majority vote and "vibe check"
      - Begin with a probationary period after approval
    footer_link:
      label: Full membership details →
      url: /join/

  - num: 3
    title: Guest Visits
    color: cyan
    type: list
    items:
      - Contact a founder to arrange a visit
      - Must be accompanied at all times
      - No unchaperoned equipment access

  - num: 4
    title: Attend Events
    color: yellow
    type: list
    items:
      - Skill shares, work sessions, socials
      - Some events open to chaperoned guests
      - '<a href="/workshops/" style="color: var(--coven-cyan);">See upcoming events →</a>'

table:
  - type: Founders
    cost: Up to $300
    access: 24/7
    storage: Full equipment & project storage
    color: accent
  - type: Members
    cost: $75
    access: Business hours
    storage: Cubby-sized
    color: warm
  - type: Guests
    cost: Free (chaperoned)
    access: During chaperone visit
    storage: None
    color: cyan

first_day:
  - Check in using the NFC access system
  - Locate your assigned storage cubby
  - Meet the founders and other members
  - Familiarize yourself with available equipment
  - Set up payment (PayPal, Venmo, or cash to Julien)
  - Ask questions — the community thrives on sharing

cta:
  text: Ready to take the next step?
  primary:
    label: Apply for Membership →
    url: /join/
  secondary:
    label: Read the FAQ
    url: /faq/
