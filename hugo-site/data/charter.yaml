# Charter ("Covenant") content. Rendered by layouts/charter/list.html
#
# Structure:
#   badge       - small pill above the title
#   preamble    - intro card text
#   founders    - list of founder names
#   mission     - mission statement card text
#   tiers       - list of {name, price, period, color, points}
#   legal       - legal structure note
#   financial   - list of financial commitment bullets
#   governance  - list of {section, title, points}
#   footer      - small footer note (HTML allowed)

badge: Governing Document
preamble: >-
  We, the undersigned, are the founding members of The Coven, a queer
  community co-op and makerspace founded by trans creators. This agreement
  defines the structure, responsibilities, and shared vision of our
  organization at its inception.

founders:
  - Julien
  - Maddie C
  - Maddie Y
  - Natalie
  - Sophie

mission: >-
  The Coven exists as a collaborative space for trans creators, focused on
  mutual support, skill-sharing, and creative projects including music,
  cosplay, video, and electronics. Our space prioritizes trans safety,
  empowerment, and creative freedom. Founded by trans people for the queer
  community, The Coven provides a safe, affirming environment for creative
  work in a world where cis/het resources dominate.

tiers:
  - name: Founders
    price: "$225"
    period: /mo
    color: accent
    points:
      - "Up to $300/mo"
      - 24/7 space access
      - Store equipment &amp; projects
      - Full voting rights
      - Approve new members
  - name: Members
    price: "$75"
    period: /mo
    color: warm
    points:
      - Invited by founders
      - Business hours access
      - Cubby-sized storage
      - Personal equipment (with approval)
      - Probationary period on joining
  - name: Guests
    price: Free
    color: cyan
    points:
      - Chaperoned by founder or member
      - Scheduled visits only

legal: >-
  The Coven operates as a sole proprietorship under Julien (DBA The Coven).
  Julien acts as financial and legal liaison for lease purposes unless
  otherwise restructured.

financial:
  - Founders maintain the lease and core utilities regardless of member count
  - Membership funds offset shared expenses and fund future improvements
  - First and last month rent paid upfront; rent due the 1st via PayPal, Venmo, or cash
  - Julien as lease holder receives funds and pays the landlord

governance:
  - section: "5.1"
    title: Voting
    points:
      - Each founder has one vote
      - Majority vote (≥3 of 5) required for finances, equipment, policy changes, and new members
      - Each founder retains veto power over new membership applications
      - Deadlocks may be tabled or resolved through structured discussion
  - section: "5.2"
    title: Leaving
    points:
      - A founder may leave at any time with 60 days written notice
      - A plan for transitioning responsibilities and financial share will be agreed upon
      - Replacing a founder requires majority approval of remaining founders
  - section: "5.3"
    title: Equipment Ownership
    points:
      - Equipment brought in by founders/members remains their property unless explicitly donated
      - Shared equipment must include a documented crash course and owner approval before use
      - Equipment purchased with community funds becomes property of The Coven

footer: 'Questions about this agreement? <a href="/contact/" style="color: var(--coven-cyan);">Contact the founders</a>.'
