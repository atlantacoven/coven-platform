{{ define "main" }}
  <div class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
    <h1 class="mb-4 text-4xl font-bold text-white">{{ .Title }}</h1>
    <p class="mb-8 text-gray-400">Browse all {{ .Title | lower }} content.</p>

    {{ if .Pages }}
      <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        {{ range .Pages }}
          {{ partial "content-card.html" . }}
        {{ end }}
      </div>
    {{ else }}
      {{ partial "empty-state.html" . }}
    {{ end }}
  </div>
{{ end }}
