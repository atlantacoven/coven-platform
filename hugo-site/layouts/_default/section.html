{{ define "main" }}
<div class="py-12 px-4 mx-auto max-w-7xl sm:px-6 lg:px-8">
  {{ partial "breadcrumb.html" . }}

  <div class="mb-12">
    <h1 class="mb-4 text-4xl font-bold text-white">{{ .Title }}</h1>
    {{ if .Content }}
    <div class="max-w-3xl text-lg text-gray-400">{{ .Content }}</div>
    {{ end }}
  </div>

  {{ if .Pages }}
  <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
    {{ range .Pages }}
    {{ partial "content-card.html" . }}
    {{ end }}
  </div>
  {{ else }}
  {{ partial "empty-state.html" . }}
  {{ end }}
</div>
{{ end }}
