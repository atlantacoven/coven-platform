{{ define "main" }}
  <div class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8">
    {{ partial "breadcrumb.html" . }}


    <div class="mb-10">
      <h1 class="text-ink font-display text-5xl leading-none tracking-wide uppercase">
        {{ .Title }}
      </h1>
      {{ if .Content }}
        <div class="text-muted mt-4 max-w-2xl font-typewriter text-base leading-relaxed">
          {{ .Content }}
        </div>
      {{ end }}
    </div>

    <hr class="cut-line" />

    {{ if .Pages }}
      <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
        {{ range $i, $p := .Pages }}
          <div class="{{ index (slice "tilt-n1" "tilt-1" "tilt-n2" "tilt-2") (mod $i 4) }}">
            {{ partial "content-card.html" $p }}
          </div>
        {{ end }}
      </div>
    {{ else }}
      {{ partial "empty-state.html" . }}
    {{ end }}
  </div>
{{ end }}
