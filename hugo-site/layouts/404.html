{{ define "main" }}
  <div class="mx-auto max-w-3xl px-4 py-24 text-center sm:px-6 lg:px-8">
    <div class="ransom mx-auto mb-8 inline-block">
      <span
        class="word-display text-pink"
        style="font-size: clamp(8rem, 22vw, 14rem); line-height: 1;"
        >4</span
      >
      <span
        class="word-typewriter text-ink"
        style="font-size: clamp(8rem, 22vw, 14rem); line-height: 1;"
        >0</span
      >
      <span
        class="word-marker text-acid"
        style="font-size: clamp(8rem, 22vw, 14rem); line-height: 1;"
        >4</span
      >
    </div>
    <h1 class="text-ink font-display text-3xl tracking-wide uppercase">Page Not Found</h1>
    <p class="text-muted mx-auto mt-4 max-w-md font-typewriter">
      This page might have moved, or might never have existed. Either way — not here.
    </p>
    <div class="mt-10 flex flex-wrap justify-center gap-6">
      <a href="/" class="zine-btn zine-btn-pink">← Back to Home</a>
      <a href="/start-here/" class="zine-btn zine-btn-ghost">Start Here</a>
    </div>
    <div class="text-acid mt-10 font-marker" style="transform: rotate(-4deg);">
      ↗ try the masthead nav
    </div>
  </div>
{{ end }}
